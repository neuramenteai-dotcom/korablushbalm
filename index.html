<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KoraBlu - Blush Balm Coreano | Tinta Labbra e Guance</title>
    <meta name="description" content="Il blush coreano multi-uso che sta spopolando su TikTok. Formula idratante, colori vibranti, durata 8 ore. Scopri KoraBlu Blush Balm.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e84393;
            --accent: #ff6b35;
            --soft: #fff0f5;
            --dark: #2d2d2d;
            --light-gray: #f5f5f5;
            --border: #efefef;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--dark);
            line-height: 1.6;
            background: #ffffff;
            overflow-x: hidden;
        }

        /* ===== ANNOUNCEMENT BAR ===== */
        .announcement-bar {
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            padding: 12px 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            animation: slideDown 0.6s ease-out;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .announcement-bar span {
            font-weight: 700;
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 42px;
            z-index: 999;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo .kora {
            color: var(--dark);
        }

        .logo .blu {
            color: var(--primary);
        }

        .header-nav {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .header-nav a {
            text-decoration: none;
            color: var(--dark);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .header-nav a:hover {
            color: var(--primary);
        }

        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .logo {
                font-size: 24px;
            }

            .header-nav {
                display: none;
            }
        }

        /* ===== HERO SECTION ===== */
        .hero {
            padding: 60px 30px;
            background: linear-gradient(135deg, var(--soft) 0%, rgba(255, 107, 53, 0.05) 100%);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            min-height: 500px;
        }

        .hero-content h1 {
            font-size: 48px;
            line-height: 1.2;
            margin-bottom: 20px;
            color: var(--dark);
            font-weight: 800;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-content p {
            font-size: 18px;
            margin-bottom: 25px;
            color: #666;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .stars {
            color: #ffc107;
            font-size: 16px;
        }

        .rating-text {
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        .price-container {
            display: flex;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }

        .price-current {
            font-size: 42px;
            font-weight: 800;
            color: var(--primary);
        }

        .price-old {
            font-size: 24px;
            color: #ccc;
            text-decoration: line-through;
        }

        .discount-badge {
            background: var(--accent);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            padding: 16px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 30px rgba(232, 67, 147, 0.3);
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(232, 67, 147, 0.4);
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        .hero-images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            animation: fadeInRight 0.8s ease-out;
        }

        .hero-image-main {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            border-radius: 20px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }

        .hero-image-main:hover {
            transform: scale(1.02);
        }

        .hero-thumbnail {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 15px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .hero-thumbnail:nth-child(3) {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }

        .hero-thumbnail:nth-child(4) {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .hero-thumbnail:nth-child(5) {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%);
        }

        .hero-thumbnail:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .hero {
                grid-template-columns: 1fr;
                padding: 40px 20px;
                gap: 30px;
            }

            .hero-content h1 {
                font-size: 32px;
            }

            .hero-content p {
                font-size: 16px;
            }
        }

        /* ===== TRUST STRIP ===== */
        .trust-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 40px 30px;
            background: var(--light-gray);
            margin-top: -30px;
            position: relative;
            z-index: 10;
        }

        .trust-item {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .trust-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .trust-item p {
            font-size: 14px;
            color: var(--dark);
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .trust-strip {
                grid-template-columns: repeat(2, 1fr);
                padding: 30px 20px;
            }
        }

        /* ===== PROBLEM SECTION ===== */
        .section {
            padding: 80px 30px;
        }

        .section-title {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 60px;
            color: var(--dark);
        }

        .problem-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 80px;
        }

        .problem-card {
            background: var(--light-gray);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            opacity: 0;
            animation: slideUp 0.6s ease-out forwards;
        }

        .problem-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .problem-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .problem-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .problem-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .problem-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .problem-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .problem-card p {
            font-size: 14px;
            color: #666;
        }

        /* ===== SOLUTION SECTION ===== */
        .solution {
            background: linear-gradient(135deg, var(--soft) 0%, rgba(232, 67, 147, 0.05) 100%);
            padding: 80px 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center
